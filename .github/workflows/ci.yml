name: Deployment Risk Platform CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Train model
        run: |
          python train.py

      - name: Show repository files
        run: |
          pwd
          find .
          ls
          ls models || true

      - name: Verify model exists
        run: |
          test -f models/best_model.pkl

      - name: Run tests
        run: |
          pytest

      - name: Verify app imports
        run: |
          python -c "import app"